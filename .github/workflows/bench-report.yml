name: bench-report

on:
  workflow_dispatch:
    inputs:
      fixture:
        description: CSS bench fixture to run
        required: true
        default: page
        type: choice
        options:
          - admin-panel
          - blog-magazine
          - dashboard
          - ecommerce-catalog
          - form-app
          - landing-product
          - page
      trials:
        description: Number of mutation trials
        required: true
        default: "10"
        type: string

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run CSS bench
        run: |
          OUTPUT_ROOT="$RUNNER_TEMP/bench-report"
          node --experimental-strip-types src/css-challenge-bench.ts \
            --fixture "${{ inputs.fixture }}" \
            --trials "${{ inputs.trials }}" \
            --backend chromium \
            --output-root "$OUTPUT_ROOT" \
            --no-db

      - name: Upload bench report
        uses: actions/upload-artifact@v4
        with:
          name: bench-report
          path: ${{ runner.temp }}/bench-report/${{ inputs.fixture }}/bench-report.json
          if-no-files-found: error
