name: migration-report

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Migration scenario to compare
        required: true
        default: tailwind-to-vanilla
        type: choice
        options:
          - tailwind-to-vanilla
          - reset-css
          - shadcn-to-luna

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run migration compare
        shell: bash
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/migration-report"
          case "${{ inputs.scenario }}" in
            tailwind-to-vanilla)
              node --experimental-strip-types src/migration-compare.ts \
                fixtures/migration/tailwind-to-vanilla/before.html \
                fixtures/migration/tailwind-to-vanilla/after.html \
                --output-dir "$OUTPUT_DIR"
              ;;
            reset-css)
              node --experimental-strip-types src/migration-compare.ts \
                --dir fixtures/migration/reset-css \
                --baseline normalize.html \
                --variants modern-normalize.html destyle.html no-reset.html \
                --output-dir "$OUTPUT_DIR"
              ;;
            shadcn-to-luna)
              node --experimental-strip-types src/migration-compare.ts \
                --dir fixtures/migration/shadcn-to-luna \
                --baseline before.html \
                --variants after.html \
                --output-dir "$OUTPUT_DIR"
              ;;
            *)
              echo "Unknown scenario: ${{ inputs.scenario }}" >&2
              exit 1
              ;;
          esac

      - name: Upload migration report
        uses: actions/upload-artifact@v7
        with:
          name: migration-report
          path: ${{ runner.temp }}/migration-report/migration-report.json
          if-no-files-found: error
